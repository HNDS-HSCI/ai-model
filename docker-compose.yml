version: "3.8"

services:
  hsci-app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHON_VERSION=3.9
      - HSCI_HOST=0.0.0.0
      - HSCI_PORT=8000
      - HSCI_DEBUG=false
    volumes:
      # Persist learning artifacts across container restarts
      - learning_data:/app/synaptic_core.json
      - learning_data:/app/episodes.jsonl
      - learning_data:/app/cognitive_weights.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  learning_data:
    driver: local
