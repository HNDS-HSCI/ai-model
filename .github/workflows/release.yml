name: Automated Tagged Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run Test Suite
        run: python -m pytest

      - name: Run Evaluation Suite & Compile Snapshots
        run: python evaluation_runner.py

      - name: Create GitHub Release and Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## HSCI Milestone 1 Release
            Automated build for version ${{ github.ref_name }}.
            
            ### Included Release Artifacts
            The verified system performance snapshots and research technical papers have been compiled and attached as release assets.
          draft: false
          prerelease: false
          files: |
            docs/reports/PERFORMANCE_SNAPSHOT.md
            evaluation_report.md
            docs/reports/REPOSITORY_AUDIT.md
            docs/reports/ARCHITECTURE_OVERVIEW.md
            paper/HSCI_V4_Technical_Paper.md
            docs/reports/DOCUMENTATION_INDEX.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
