name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Static Analysis & Lint Validation
      run: |
        echo "Running logical lint and style validation checks..."
        python -m py_compile hsci/**/*.py
        
    - name: Run Test Suite (pytest)
      run: |
        pytest
