<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSCI - Hyper-Symbolic AI</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#151e2e',
                            950: '#020617',
                        },
                        accent: {
                            500: '#06b6d4', // Cyan 500
                            600: '#0891b2', // Cyan 600
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #020617; /* Slate 950 */
            color: #e2e8f0; /* Slate 200 */
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* App handles scrolling */
        }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .glass-bubble-ai {
            background: rgba(30, 41, 59, 0.4); /* Slate 800 / 40% */
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .glass-bubble-user {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .markdown-prose pre {
            background: #0f172a;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            border: 1px solid #1e293b;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .markdown-prose code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { Send, cpu, Brain, Sparkles, ChevronDown, ChevronRight, Terminal, CheckCircle2, XCircle, AlertCircle, History, Trash2 } = lucide;

        // --- Component: Thinking Indicator ---
        const ThinkingIndicator = () => (
            <div className="flex items-center space-x-1 h-6">
                <div className="w-2 h-2 bg-accent-500 rounded-full animate-bounce" style={{ animationDelay: '0s' }}></div>
                <div className="w-2 h-2 bg-accent-500 rounded-full animate-bounce" style={{ animationDelay: '0.1s' }}></div>
                <div className="w-2 h-2 bg-accent-500 rounded-full animate-bounce" style={{ animationDelay: '0.2s' }}></div>
            </div>
        );

        // --- Component: Markdown Renderer (Simple) ---
        // A real app would use a library, but for a single file demo, we'll do basic formatting
        const MarkdownText = ({ content }) => {
            // Very basic replacement for bold, code blocks, etc.
            // React handles basic text safety, but for "dangerouslySetInnerHTML" we need to be careful.
            // Here we just render plain text with preserved whitespace for simplicity in this prototype, 
            // relying on CSS for pre-wrap.
            return <div className="whitespace-pre-wrap leading-relaxed">{content}</div>;
        };

        // --- Component: Chat Message ---
        const ChatMessage = ({ message }) => {
            const [expanded, setExpanded] = useState(false);
            const isUser = message.role === 'user';
            const isSystem = message.role === 'system';

            if (isSystem) return null; // Or render system alerts differently

            return (
                <div className={`flex w-full ${isUser ? 'justify-end' : 'justify-start'} animate-slide-up mb-6`}>
                    <div className={`flex max-w-3xl ${isUser ? 'flex-row-reverse' : 'flex-row'} gap-4`}>
                        
                        {/* Avatar */}
                        <div className={`flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center ${isUser ? 'bg-slate-700' : 'bg-accent-500/20 text-accent-500'}`}>
                            {isUser ? <span className="text-xs font-bold text-white">YOU</span> : <i data-lucide="brain" className="w-5 h-5"></i>}
                        </div>

                        {/* Content */}
                        <div className={`flex flex-col space-y-2 ${isUser ? 'items-end' : 'items-start'}`}>
                            
                            {/* Message Bubble */}
                            <div className={`px-5 py-3 rounded-2xl shadow-lg text-sm md:text-base ${ 
                                isUser 
                                    ? 'glass-bubble-user text-white rounded-tr-sm' 
                                    : 'glass-bubble-ai text-slate-200 rounded-tl-sm'
                            }`}>
                                <MarkdownText content={message.content} />
                            </div>

                            {/* Reasoning Accordion (Only for AI) */}
                            {!isUser && message.reasoning && (
                                <div className="w-full max-w-2xl mt-2">
                                    <button 
                                        onClick={() => setExpanded(!expanded)}
                                        className="flex items-center gap-2 text-xs font-medium text-slate-400 hover:text-accent-500 transition-colors py-1 select-none"
                                    >
                                        {expanded ? <i data-lucide="chevron-down" className="w-3 h-3"/> : <i data-lucide="chevron-right" className="w-3 h-3"/>}
                                        <span>Cognitive Trace</span>
                                        <span className="text-[10px] bg-slate-800 px-1.5 py-0.5 rounded border border-slate-700">
                                            {message.success ? 'VERIFIED' : 'UNVERIFIED'}
                                        </span>
                                    </button>
                                    
                                    {expanded && (
                                        <div className="mt-2 p-4 rounded-lg bg-slate-950 border border-slate-800/50 text-xs font-mono text-slate-400 overflow-x-auto shadow-inner animate-fade-in">
                                            <div className="flex items-center gap-2 mb-2 border-b border-slate-800 pb-2">
                                                <i data-lucide="terminal" className="w-3 h-3 text-slate-500"/>
                                                <span className="uppercase tracking-widest text-[10px] text-slate-500">Mental Model Log</span>
                                            </div>
                                            <div className="whitespace-pre">{message.reasoning}</div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App ---
        function App() {
            const [input, setInput] = useState("");
            const [messages, setMessages] = useState([
                { role: 'ai', content: "Hello. I am HSCI, a Hyper-Symbolic Cognitive Intelligence.\n\nI don't just guess—I prove. Ask me to solve a math problem, generate code, or analyze data, and I will show you my reasoning.", reasoning: null }
            ]);
            const [isThinking, setIsThinking] = useState(false);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
                lucide.createIcons(); // Re-render icons on updates
            }, [messages, isThinking]);

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim() || isThinking) return;

                const userText = input;
                setInput("");
                
                // Add User Message
                const newMessages = [...messages, { role: 'user', content: userText }];
                setMessages(newMessages);
                setIsThinking(true);

                try {
                    const response = await fetch('/process', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ stimulus: userText })
                    });
                    
                    if (!response.ok) throw new Error("Brain unreachable");
                    
                    const data = await response.json();
                    
                    // Add AI Response
                    setMessages(prev => [...prev, {
                        role: 'ai',
                        content: data.solution || "I could not derive a solution.",
                        reasoning: data.deliberation,
                        success: data.success
                    }]);

                } catch (error) {
                    setMessages(prev => [...prev, {
                        role: 'ai',
                        content: "I encountered a connection error. Please ensure the backend is running.",
                        reasoning: `Error Details:\n${error.message}`,
                        success: false
                    }]);
                } finally {
                    setIsThinking(false);
                }
            };

            const clearHistory = () => {
                setMessages([
                    { role: 'ai', content: "Memory cleared. Ready for new inputs.", reasoning: null }
                ]);
            };

            return (
                <div className="flex flex-col h-screen max-h-screen bg-slate-950 text-slate-200">
                    
                    {/* Header */}
                    <header className="flex-none h-16 glass-panel flex items-center justify-between px-6 z-10 relative">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-gradient-to-tr from-accent-600 to-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-accent-500/20">
                                <i data-lucide="brain" className="w-5 h-5 text-white"></i>
                            </div>
                            <div>
                                <h1 className="font-bold text-lg tracking-tight text-white leading-none">HSCI</h1>
                                <span className="text-[10px] text-accent-500 uppercase tracking-widest font-semibold">Neuro-Symbolic Core</span>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-4">
                            <div className="hidden md:flex items-center gap-6 text-xs font-medium text-slate-500">
                                <span className="flex items-center gap-1.5"><div className="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div> PROVER ONLINE</span>
                                <span className="flex items-center gap-1.5"><div className="w-1.5 h-1.5 rounded-full bg-accent-500 shadow-[0_0_8px_rgba(6,182,212,0.5)]"></div> MODEL ONLINE</span>
                            </div>
                            <button onClick={clearHistory} className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white transition-colors" title="Clear History">
                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                            </button>
                        </div>
                    </header>

                    {/* Main Chat Area */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-6 scroll-smooth relative">
                        <div className="max-w-4xl mx-auto space-y-6 pb-24">
                            {messages.map((msg, idx) => (
                                <ChatMessage key={idx} message={msg} />
                            ))}
                            
                            {isThinking && (
                                <div className="flex justify-start animate-slide-up">
                                    <div className="flex flex-row gap-4">
                                        <div className="w-8 h-8 rounded-full bg-accent-500/20 text-accent-500 flex items-center justify-center">
                                            <i data-lucide="sparkles" className="w-4 h-4 animate-pulse"></i>
                                        </div>
                                        <div className="glass-bubble-ai px-4 py-3 rounded-2xl rounded-tl-sm flex items-center gap-3">
                                            <span className="text-xs font-medium text-slate-400">Deliberating</span>
                                            <ThinkingIndicator />
                                        </div>
                                    </div>
                                </div>
                            )}
                            <div ref={messagesEndRef} />
                        </div>
                    </main>

                    {/* Input Area */}
                    <footer className="flex-none p-4 md:p-6 bg-gradient-to-t from-slate-950 via-slate-950 to-transparent absolute bottom-0 w-full z-20">
                        <div className="max-w-3xl mx-auto">
                            <form onSubmit={handleSend} className="relative group">
                                <div className="absolute -inset-0.5 bg-gradient-to-r from-accent-500 to-blue-600 rounded-xl blur opacity-20 group-hover:opacity-40 transition duration-500"></div>
                                <div className="relative flex items-center bg-slate-900 rounded-xl border border-slate-700 shadow-2xl overflow-hidden">
                                    <input 
                                        type="text" 
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        placeholder="Ask for a proof, code, or analysis..."
                                        className="flex-1 bg-transparent border-none text-slate-100 placeholder-slate-500 px-4 py-4 focus:ring-0 focus:outline-none text-base"
                                        autoFocus
                                    />
                                    <button 
                                        type="submit"
                                        disabled={!input.trim() || isThinking}
                                        className={`p-3 mr-2 rounded-lg transition-all duration-200 ${ 
                                            input.trim() && !isThinking
                                                ? 'bg-accent-600 text-white hover:bg-accent-500 shadow-lg shadow-accent-900/20'
                                                : 'bg-slate-800 text-slate-600 cursor-not-allowed'
                                        }`}
                                    >
                                        <i data-lucide="send" className="w-5 h-5"></i>
                                    </button>
                                </div>
                            </form>
                            <div className="text-center mt-3">
                                <p className="text-[10px] text-slate-600 uppercase tracking-widest font-medium">
                                    HSCI Safe Harbor • Generated content is rigorously verified
                                </p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
